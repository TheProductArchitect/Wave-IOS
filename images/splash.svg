<svg width="1080" height="1920" viewBox="0 0 1080 1920" xmlns="http://www.w3.org/2000/svg">
  <rect width="1080" height="1920" fill="#000000" />
  
  <g transform="translate(540, 860)">
    <!-- Outer Glow -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#00FFFF" stroke-width="6" opacity="0.1" filter="blur(10px)"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00FFFF" stroke-width="6" opacity="0.2" filter="blur(8px)"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00FFFF" stroke-width="6" opacity="0.3" filter="blur(6px)"/>

    <!-- Concentric Rings -->
    <circle cx="0" cy="0" r="180" fill="none" stroke="#00FFFF" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="120" fill="none" stroke="#00FFFF" stroke-width="3" opacity="0.9"/>
    <circle cx="0" cy="0" r="60" fill="none" stroke="#00FFFF" stroke-width="4" opacity="1"/>
    
    <!-- Central Point -->
    <circle cx="0" cy="0" r="12" fill="#00FFFF" />
  </g>
  
  <!-- Wordmark -->
  <text x="540" y="1200" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="64" font-weight="600" fill="#00FFFF" text-anchor="middle" letter-spacing="24">WAVE</text>
</svg>